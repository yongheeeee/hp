<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMCA Performing Arts - Deep Time</title>
    <style>
        :root { --main-bg: #ffffff; --text-color: #000000; --accent-color: #666666; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--main-bg); color: var(--text-color); line-height: 1.6; }
        
        /* 헤더 스타일 */
        header { padding: 40px 20px; border-bottom: 1px solid #eee; margin-bottom: 30px; text-align: center; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        p.subtitle { color: var(--accent-color); font-size: 14px; margin-top: 10px; }

        /* Artsy 그리드 레이아웃 */
        .gallery { column-count: 3; column-gap: 20px; padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; } }

        .item { display: inline-block; width: 100%; margin-bottom: 25px; cursor: pointer; position: relative; }
        .item img { width: 100%; display: block; filter: grayscale(20%); transition: 0.3s; }
        .item:hover img { filter: grayscale(0%); transform: scale(1.02); }
        .item-info { margin-top: 10px; font-size: 13px; border-top: 1px solid #f0f0f0; padding-top: 8px; }
        .item-title { font-weight: bold; }

        /* 모달(Modal) 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); overflow-y: auto; }
        .modal-content { max-width: 800px; margin: 10% auto; padding: 20px; position: relative; }
        .close { position: absolute; top: -50px; right: 0; font-size: 40px; cursor: pointer; color: #000; }
        
        .modal-img { width: 100%; height: auto; margin-bottom: 30px; }
        .modal-header { border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-title { font-size: 32px; font-weight: 800; margin: 0; }
        .modal-year { color: #888; font-size: 16px; margin-top: 5px; }
        .modal-desc { font-size: 16px; color: #333; white-space: pre-line; }

    </style>
</head>
<body>

<header>
    <h1>MMCA PERFORMING ARTS</h1>
    <p class="subtitle">국립현대미술관 다원예술 2026: Deep Time</p>
</header>

        <img src="https://picsum.photos/600/800?random=11" alt="Deep Time">
        <div class="item-info">
            <div class="item-title">Deep Time: Chapter 1</div>
            <div>The Detective's Time (2026)</div>
        </div>
    </div>
