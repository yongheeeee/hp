<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMCA Performing Arts Showcase - Test</title>
    <style>
        /* 1. 기본 스타일 설정 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
        }

        header {
            border-bottom: 1px solid #000;
            margin-bottom: 40px;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* 2. Artsy 스타일의 이미지 그리드 (컬럼 방식) */
        .gallery-container {
            column-count: 3; /* 화면 너비에 따라 칸 수 조절 */
            column-gap: 20px;
        }

        @media (max-width: 900px) { .gallery-container { column-count: 2; } }
        @media (max-width: 600px) { .gallery-container { column-count: 1; } }

        .art-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .art-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        /* 3. 텍스트 오버레이 효과 */
        .art-info {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* 어두운 투명 배경 */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0; /* 평소에는 숨김 */
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .art-item:hover .art-info {
            opacity: 1; /* 마우스 올리면 보임 */
        }

        .art-item:hover img {
            transform: scale(1.05); /* 살짝 확대 */
        }

        .art-info h3 { margin: 0 0 10px 0; font-size: 18px; }
        .art-info p { margin: 0; font-size: 14px; line-height: 1.5; }

    </style>
</head>
<body>

    <header>
        <h1>Artsy Style Showcase</h1>
    </header>

    <main class="gallery-container">
        <div class="art-item" onclick="alert('작품 상세 페이지로 이동하거나 팝업을 띄울 수 있습니다.')">
            <img src="https://picsum.photos/400/600?random=1" alt="Art 1">
            <div class="art-info">
                <h3>Deep Time: Chapter 1</h3>
                <p>2026 MMCA Performing Arts<br>The Detective's Time</p>
            </div>
        </div>

        <div class="art-item">
            <img src="https://picsum.photos/400/400?random=2" alt="Art 2">
            <div class="art-info">
                <h3>Interdisciplinary Project</h3>
                <p>Forest (2025)</p>
            </div>
        </div>

        <div class="art-item">
            <img src="https://picsum.photos/400/700?random=3" alt="Art 3">
            <div class="art-info">
                <h3>Artist Collaboration</h3>
                <p>Luis Guenel (Chile)</p>
            </div>
        </div>

        <div class="art-item">
            <img src="https://picsum.photos/400/500?random=4" alt="Art 4">
            <div class="art-info">
                <h3>Performance Showcase</h3>
                <p>Utrecht, Netherlands (May 2026)</p>
            </div>
        </div>
        
        </main>

</body>
</html>
